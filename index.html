<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Interactive Map - Taytay Palawan</title>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/leaflet.photon.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#e9e9e9;
        }

        /* MAIN CONTAINER */
        .container{
            width:100%;
            min-height:100vh;
            border:3px solid #1a1a1a;
        }

        /* HEADER */
        .header{
            width:100%;
            background:#045b84;
            padding:15px 20px;
            color:white;
            position:relative;
            text-align:center;
        }

        .header h3{
            font-size:25px;
            margin-top:5px;
        }

        .header p{
            margin-top:5px;
            font-size:18px;
            font-weight:bold;
        }

        /* LOGO */
        .logo{
            position:absolute;
            left:170px;
            top:15px;
            width:70px;
            height:70px;
            border-radius:50%;
            background:yellow;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:12px;
            box-shadow:0 3px 8px rgba(0,0,0,0.5);
        }

        /* SEARCH AREA */
        .search-container{
            width:100%;
            display:flex;
            justify-content:center;
            margin-top:20px;
            margin-bottom:10px;
        }

        .search-box{
            width:500px;
            height:55px;
            border-radius:12px;
            border:2px solid #24455f;
            outline:none;
            padding-left:20px;
            font-size:25px;
            background:#d9e5ee;
        }

        .search-btn{
            width:60px;
            height:55px;
            border-radius:12px;
            border:2px solid #24455f;
            margin-left:-10px;
            background:#d9e5ee;
            cursor:pointer;
            font-size:25px;
        }

        /* MAP AREA */
        .map-wrapper{
            width:100%;
            display:flex;
            justify-content:center;
            margin-top:10px;
        }

        #map{
            width:80%;
            height:500px;
            border:3px solid #0d3144;
        }

        /* LOCATION INFO */
        .info-box{
            width:520px;
            margin:20px auto;
            border:2px solid #24455f;
            background:white;
        }

        .info-title{
            background:#c5dce9;
            padding:10px;
            text-align:center;
            font-size:20px;
            font-style:italic;
            font-weight:bold;
            color:#555;
            border-bottom:2px solid #24455f;
        }

        .info-content{
            min-height:80px;
            padding:15px;
            font-size:18px;
        }

        .leaflet-control-zoom{
            margin-top:20px !important;
            margin-left:20px !important;
        }

        .leaflet-popup-content{
            font-size:15px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="logo">
            logo
        </div>

        <h2>Poblacion, Taytay, Palawan</h2>
        <h3>INTERACTIVE MAP</h3>
        <p>By: Student Name/s</p>

    </div>

    <!-- SEARCH -->
    <div class="search-container">

        <input type="text" id="searchInput" class="search-box" placeholder="search">

        <button class="search-btn" onclick="searchLocation()">
            🔍
        </button>

    </div>

    <!-- MAP -->
    <div class="map-wrapper">
        <div id="map"></div>
    </div>

    <!-- LOCATION INFORMATION -->
    <div class="info-box">

        <div class="info-title">
            Location information
        </div>

        <div class="info-content" id="infoContent">
            Click a location marker to show information.
        </div>

    </div>

</div>

/* ============================
   CREATE MAP
============================ */

var map = L.map('map', {
    zoomControl:true,
    maxZoom:28,
    minZoom:1
}).fitBounds([
    [10.802812868054767,119.48876562985919],
    [10.839607072506512,119.55754525503288]
]);

/* ============================
   BASEMAP
============================ */

var layer_GoogleHybrid_0 = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    attribution:'Google',
    maxZoom:28
});

map.addLayer(layer_GoogleHybrid_0);

/* ============================
   INFO BOX FUNCTION
============================ */

function showInfo(title){

    document.getElementById("infoContent").innerHTML =
        "<b>Selected Location:</b><br><br>" + title;

}

/* ============================
   COMMON STYLE
============================ */

function commonStyle() {
    return {
        radius:8,
        fillColor:"#ff2d2d",
        color:"#800000",
        weight:2,
        opacity:1,
        fillOpacity:1
    };
}

/* ============================
   FORT SANTA ISABEL
============================ */

function pop_FortSantaIsabel_1(feature, layer){

    var name = feature.properties['Fort Santa'];

    layer.bindPopup("<b>" + name + "</b>");

    layer.on('click', function(){
        showInfo(name);
    });
}

var layer_FortSantaIsabel_1 = new L.geoJson(json_FortSantaIsabel_1,{
    onEachFeature: pop_FortSantaIsabel_1,
    pointToLayer: function(feature, latlng){
        return L.circleMarker(latlng, commonStyle());
    }
});

map.addLayer(layer_FortSantaIsabel_1);

/* ============================
   SEARCH FUNCTION
============================ */

function searchLocation(){

    var text = document.getElementById("searchInput").value.toLowerCase();

    var found = false;

    map.eachLayer(function(layer){

        if(layer.feature){

            var props = layer.feature.properties;

            for(var key in props){

                if(props[key] != null){

                    var value = props[key].toString().toLowerCase();

                    if(value.includes(text)){

                        var latlng = layer.getLatLng();

                        map.setView(latlng, 18);

                        layer.openPopup();

                        showInfo(props[key]);

                        found = true;

                        break;
                    }
                }
            }
        }
    });

    if(!found){
        alert("Location not found!");
    }
}
